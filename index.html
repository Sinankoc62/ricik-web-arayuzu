<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riçik Köyü Derneği</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="app" class="min-h-screen flex flex-col justify-between">
        </div>

    <script>
        const API_URL = "https://ricik-backend2.onrender.com/api";
        
        // Aktif ekranı takip etmek için durum değişkeni ('login', 'register', 'dashboard')
        let currentScreen = localStorage.getItem('userToken') ? 'dashboard' : 'login';

        function navigateTo(screen) {
            currentScreen = screen;
            renderPage();
        }

        // Ekranları Yöneten Dinamik Router
        function renderPage() {
            const app = document.getElementById('app');
            const token = localStorage.getItem('userToken');
            const userRole = localStorage.getItem('userRole');

            if (token) {
                if (userRole === 'admin') {
                    app.innerHTML = getAdminTemplate();
                    loadAdminData();
                } else {
                    app.innerHTML = getProfileTemplate();
                }
                return;
            }

            // Giriş ve Kayıt ekranları arası geçiş kontrolü
            if (currentScreen === 'register') {
                app.innerHTML = getRegisterTemplate();
            } else {
                app.innerHTML = getLoginTemplate();
            }
        }

        // ==========================================
        // EKRAN ŞABLONLARI (TEMPLATES)
        // ==========================================

        function getLoginTemplate() {
            return `
                <div class="flex items-center justify-center min-h-screen bg-gray-100 px-4">
                    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                        <h2 class="text-2xl font-bold text-center text-[#1B4D3E] mb-6">Riçik Derneği Üye Girişi</h2>
                        <div id="login-error" class="hidden p-3 bg-red-100 text-red-700 text-sm rounded-lg mb-4 font-medium"></div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-600">Telefon Numarası</label>
                                <input type="text" id="login-phone" placeholder="05xxxxxxxxx" class="w-full mt-1 p-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-600">Şifre</label>
                                <input type="password" id="login-pass" placeholder="******" class="w-full mt-1 p-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                            </div>
                            <button onclick="handleLogin()" class="w-full bg-[#1B4D3E] hover:bg-emerald-800 text-white p-2.5 rounded-lg font-bold transition duration-200 shadow">Giriş Yap</button>
                        </div>
                        <div class="text-center mt-4">
                            <p class="text-sm text-gray-600">Henüz üye değil misiniz? 
                                <a href="#" onclick="navigateTo('register')" class="text-emerald-700 font-bold hover:underline">Yeni Başvuru Yap</a>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function getRegisterTemplate() {
            return `
                <div class="flex items-center justify-center min-h-screen bg-gray-100 px-4 py-8">
                    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                        <h2 class="text-2xl font-bold text-center text-[#1B4D3E] mb-2">Yeni Üyelik Başvurusu</h2>
                        <p class="text-xs text-gray-500 text-center mb-6">Lütfen bilgilerinizi eksiksiz doldurun. Başvurunuz yönetim onayına düşecektir.</p>
                        
                        <div id="reg-error" class="hidden p-3 bg-red-100 text-red-700 text-sm rounded-lg mb-4 font-medium"></div>
                        <div id="reg-success" class="hidden p-3 bg-green-100 text-green-700 text-sm rounded-lg mb-4 font-medium"></div>

                        <div id="register-form" class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600">Adınız</label>
                                    <input type="text" id="reg-ad" placeholder="Ahmet" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600">Soyadınız</label>
                                    <input type="text" id="reg-soyad" placeholder="Yılmaz" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600">Baba Adı</label>
                                    <input type="text" id="reg-baba" placeholder="Mehmet" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-gray-600">Anne Adı</label>
                                    <input type="text" id="reg-anne" placeholder="Ayşe" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600">Doğum Tarihi</label>
                                <input type="date" id="reg-dogum" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600">Telefon Numarası</label>
                                <input type="text" id="reg-phone" placeholder="05xxxxxxxxx" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-600">Şifre Belirleyin</label>
                                <input type="password" id="reg-pass" placeholder="******" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600 text-sm">
                            </div>
                            <button onclick="handleRegister()" class="w-full bg-[#1B4D3E] hover:bg-emerald-800 text-white p-2.5 rounded-lg font-bold transition duration-200 shadow text-sm">Başvuruyu Tamamla</button>
                        </div>
                        <div class="text-center mt-4 border-t border-gray-100 pt-3">
                            <p class="text-sm text-gray-600">Zaten başvurunuz var mı? 
                                <a href="#" onclick="navigateTo('login')" class="text-emerald-700 font-bold hover:underline">Giriş Ekranına Dön</a>
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }

        function getAdminTemplate() {
            return `
                <div class="flex min-h-screen bg-gray-50">
                    <div class="w-64 bg-[#1B4D3E] text-white p-6 flex flex-col justify-between">
                        <div class="space-y-6">
                            <h1 class="text-xl font-bold border-b border-emerald-700 pb-4 tracking-wide">Riçik Yönetim</h1>
                            <nav class="space-y-1">
                                <a href="#" class="block py-2.5 px-4 rounded-lg bg-emerald-800 font-semibold shadow">Onay Bekleyenler</a>
                            </nav>
                        </div>
                        <button onclick="handleLogout()" class="w-full bg-red-900 hover:bg-red-800 text-red-200 py-2.5 px-4 rounded-lg font-semibold text-left transition">Kapat / Çıkış</button>
                    </div>
                    <div class="flex-1 p-8 overflow-y-auto">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Üyelik Başvuruları Havuzu</h2>
                        <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-gray-100 text-xs font-bold uppercase text-gray-600 border-b">
                                    <tr>
                                        <th class="p-4">Ad Soyad</th>
                                        <th class="p-4">Anne / Baba Adı</th>
                                        <th class="p-4">Telefon</th>
                                        <th class="p-4 text-right">İşlem</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-table-body" class="text-sm divide-y divide-gray-100">
                                    <tr><td colspan="4" class="p-4 text-center text-gray-500 font-medium">Başvurular yükleniyor...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function getProfileTemplate() {
            return `
                <div class="max-w-xl mx-auto my-16 bg-white p-8 rounded-xl shadow-lg border border-gray-200 text-center">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">✓</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Sisteme Başarıyla Girdiniz!</h2>
                    <p class="text-sm text-gray-600 mb-6">Köylü onay ve profil yönetim sisteminiz şu an aktiftir.</p>
                    <button onclick="handleLogout()" class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-lg font-semibold text-sm transition">Güvenli Çıkış</button>
                </div>
            `;
        }

        // ==========================================
        // İLETİŞİM MOTORLARI (API CALLS)
        // ==========================================

        async function handleLogin() {
            const telefon = document.getElementById('login-phone').value.trim();
            const sifre = document.getElementById('login-pass').value.trim();
            const errorDiv = document.getElementById('login-error');

            if(!telefon || !sifre) {
                errorDiv.innerText = "Lütfen tüm alanları doldurun.";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    mode: 'cors',
                    body: JSON.stringify({ telefon, sifre })
                });
                
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userRole', data.user.rol);
                    errorDiv.classList.add('hidden');
                    navigateTo('dashboard');
                } else {
                    errorDiv.innerText = data.message || "Giriş başarısız.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = "Canlı sunucuya ulaşılamıyor.";
                errorDiv.classList.remove('hidden');
            }
        }

        async function handleRegister() {
            const ad = document.getElementById('reg-ad').value.trim();
            const soyad = document.getElementById('reg-soyad').value.trim();
            const baba_adi = document.getElementById('reg-baba').value.trim();
            const anne_adi = document.getElementById('reg-anne').value.trim();
            const dogum_tarihi = document.getElementById('reg-dogum').value;
            const telefon = document.getElementById('reg-phone').value.trim();
            const sifre = document.getElementById('reg-pass').value.trim();
            
            const errorDiv = document.getElementById('reg-error');
            const successDiv = document.getElementById('reg-success');

            if(!ad || !soyad || !baba_adi || !anne_adi || !dogum_tarihi || !telefon || !sifre) {
                errorDiv.innerText = "Lütfen tüm alanları doldurun.";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    mode: 'cors',
                    body: JSON.stringify({ ad, soyad, baba_adi, anne_adi, dogum_tarihi, telefon, sifre })
                });

                const data = await res.json();

                if(res.ok) {
                    errorDiv.classList.add('hidden');
                    successDiv.innerText = data.message || "Başvurunuz başarıyla alındı!";
                    successDiv.classList.remove('hidden');
                    document.getElementById('register-form').classList.add('hidden');
                    setTimeout(() => { navigateTo('login'); }, 4000);
                } else {
                    errorDiv.innerText = data.message || "Kayıt sırasında bir hata oluştu.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = "Sunucu bağlantı hatası yaşandı.";
                errorDiv.classList.remove('hidden');
            }
        }

        async function loadAdminData() {
            const token = localStorage.getItem('userToken');
            try {
                const res = await fetch(`${API_URL}/admin/users?durum=onay_bekliyor`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/json' }
                });
                const data = await res.json();
                const tbody = document.getElementById('admin-table-body');

                if (!res.ok || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-gray-500 font-medium">Onay sırasında bekleyen yeni köylü başvurusu bulunmuyor.</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(u => `
                    <tr class="hover:bg-gray-50/70 transition">
                        <td class="p-4 font-semibold text-gray-700">${u.ad} ${u.soyad}</td>
                        <td class="p-4 text-gray-600">${u.anne_adi} / ${u.baba_adi}</td>
                        <td class="p-4 text-gray-600">${u.telefon}</td>
                        <td class="p-4 text-right">
                            <button onclick="approveUser(${u.id})" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 py-1.5 rounded-lg text-xs shadow-sm transition">Onayla</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('admin-table-body').innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Veriler sunucudan çekilemedi.</td></tr>`;
            }
        }

        async function approveUser(id) {
            const token = localStorage.getItem('userToken');
            if(!confirm("Bu kullanıcının dernek üyeliğini onaylıyor musunuz?")) return;
            try {
                const res = await fetch(`${API_URL}/admin/users/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ yeniDurum: 'aktif' })
                });
                if(res.ok) {
                    alert("Köylümüz başarıyla onaylandı!");
                    loadAdminData();
                } else { alert("İşlem sunucu tarafından reddedildi."); }
            } catch(e) { alert("Sistem hatası."); }
        }

        function handleLogout() {
            localStorage.clear();
            currentScreen = 'login';
            renderPage();
        }

        // İlk yükleme tetikleyicisi
        renderPage();
    </script>
</body>
</html>
