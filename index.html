<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riçik Köyü Derneği</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="app" class="min-h-screen flex flex-col justify-between">
        </div>

    <script>
        // CANLI SUNUCU REHBERİ
        const API_URL = "https://ricik-backend2.onrender.com/api";

        // Ekranları Yöneten Dinamik Router
        function renderPage() {
            const app = document.getElementById('app');
            const token = localStorage.getItem('userToken');
            const userRole = localStorage.getItem('userRole');

            if (!token) {
                app.innerHTML = getLoginTemplate();
                return;
            }

            if (userRole === 'admin') {
                app.innerHTML = getAdminTemplate();
                loadAdminData();
            } else {
                app.innerHTML = getProfileTemplate();
            }
        }

        function getLoginTemplate() {
            return `
                <div class="flex items-center justify-center min-h-screen bg-gray-100 px-4">
                    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                        <h2 class="text-2xl font-bold text-center text-[#1B4D3E] mb-6">Riçik Derneği Üye Girişi</h2>
                        <div id="login-error" class="hidden p-3 bg-red-100 text-red-700 text-sm rounded-lg mb-4 font-medium"></div>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-600">Telefon Numarası</label>
                                <input type="text" id="login-phone" placeholder="05xxxxxxxxx" class="w-full mt-1 p-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-600">Şifre</label>
                                <input type="password" id="login-pass" placeholder="******" class="w-full mt-1 p-2.5 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600">
                            </div>
                            <button onclick="handleLogin()" class="w-full bg-[#1B4D3E] hover:bg-emerald-800 text-white p-2.5 rounded-lg font-bold transition duration-200 shadow">Giriş Yap</button>
                        </div>
                        <div class="text-center mt-6 pt-4 border-t border-gray-100 text-xs text-gray-500">
                            <b>Güncel Test Hesabı:</b><br>
                            Tel: 05555555555 | Şifre: 123456
                        </div>
                    </div>
                </div>
            `;
        }

        function getAdminTemplate() {
            return `
                <div class="flex min-h-screen bg-gray-50">
                    <div class="w-64 bg-[#1B4D3E] text-white p-6 flex flex-col justify-between">
                        <div class="space-y-6">
                            <h1 class="text-xl font-bold border-b border-emerald-700 pb-4 tracking-wide">Riçik Yönetim</h1>
                            <nav class="space-y-1">
                                <a href="#" class="block py-2.5 px-4 rounded-lg bg-emerald-800 font-semibold shadow">Onay Bekleyenler</a>
                            </nav>
                        </div>
                        <button onclick="handleLogout()" class="w-full bg-red-900 hover:bg-red-800 text-red-200 py-2.5 px-4 rounded-lg font-semibold text-left transition">Kapata / Çıkış</button>
                    </div>
                    <div class="flex-1 p-8 overflow-y-auto">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Üyelik Başvuruları Havuzu</h2>
                        <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-gray-100 text-xs font-bold uppercase text-gray-600 border-b">
                                    <tr>
                                        <th class="p-4">Ad Soyad</th>
                                        <th class="p-4">Anne / Baba Adı</th>
                                        <th class="p-4">Telefon</th>
                                        <th class="p-4 text-right">İşlem</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-table-body" class="text-sm divide-y divide-gray-100">
                                    <tr><td colspan="4" class="p-4 text-center text-gray-500 font-medium">Başvurular yükleniyor...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function getProfileTemplate() {
            return `
                <div class="max-w-xl mx-auto my-16 bg-white p-8 rounded-xl shadow-lg border border-gray-200 text-center">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">✓</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Sisteme Başarıyla Girdiniz!</h2>
                    <p class="text-sm text-gray-600 mb-6">Köylü onay ve profil yönetim sisteminiz şu an aktiftir.</p>
                    <button onclick="handleLogout()" class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-lg font-semibold text-sm transition">Güvenli Çıkış</button>
                </div>
            `;
        }

        // ==========================================
        // İLETİŞİM MOTORU (CORS UYUMLU FETCH)
        // ==========================================
        async function handleLogin() {
            const telefon = document.getElementById('login-phone').value.trim();
            const sifre = document.getElementById('login-pass').value.trim();
            const errorDiv = document.getElementById('login-error');

            if(!telefon || !sifre) {
                errorDiv.innerText = "Lütfen tüm alanları doldurun.";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                // Tarayıcı kısıtlamalarını aşan gelişmiş CORS isteği
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    mode: 'cors',
                    body: JSON.stringify({ telefon, sifre })
                });
                
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userRole', data.user.rol);
                    errorDiv.classList.add('hidden');
                    renderPage();
                } else {
                    // Sunucudan gelen özel hata mesajını ekrana basıyoruz
                    errorDiv.innerText = data.message || "Giriş başarısız.";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = "Canlı sunucuya ulaşılamıyor (Bağlantı hatası).";
                errorDiv.classList.remove('hidden');
            }
        }

        async function loadAdminData() {
            const token = localStorage.getItem('userToken');
            try {
                const res = await fetch(`${API_URL}/admin/users?durum=onay_bekliyor`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/json' }
                });
                const data = await res.json();
                const tbody = document.getElementById('admin-table-body');

                if (!res.ok || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-gray-500 font-medium">Onay sırasında bekleyen yeni köylü başvurusu bulunmuyor.</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(u => `
                    <tr class="hover:bg-gray-50/70 transition">
                        <td class="p-4 font-semibold text-gray-700">${u.ad} ${u.soyad}</td>
                        <td class="p-4 text-gray-600">${u.anne_adi} / ${u.baba_adi}</td>
                        <td class="p-4 text-gray-600">${u.telefon}</td>
                        <td class="p-4 text-right">
                            <button onclick="approveUser(${u.id})" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 py-1.5 rounded-lg text-xs shadow-sm transition">Onayla</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('admin-table-body').innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Veriler sunucudan çekilemedi.</td></tr>`;
            }
        }

        async function approveUser(id) {
            const token = localStorage.getItem('userToken');
            if(!confirm("Bu kullanıcının dernek üyeliğini onaylıyor musunuz?")) return;
            try {
                const res = await fetch(`${API_URL}/admin/users/${id}/status`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ yeniDurum: 'aktif' })
                });
                if(res.ok) {
                    alert("Köylümüz başarıyla onaylandı ve haritada görünür kılındı!");
                    loadAdminData();
                } else { alert("İşlem sunucu tarafından reddedildi."); }
            } catch(e) { alert("Sistem hatası."); }
        }

        function handleLogout() {
            localStorage.clear();
            renderPage();
        }

        // İlk Yüklemede Sayfayı Tetikle
        renderPage();
    </script>
</body>
</html>
